server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA routing — every unknown path falls back to index.html so
    # client-side routes (/spaces/:id, /s/:token, ...) render the
    # React app instead of returning a 404.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Lightweight liveness probe. Avoids round-tripping to the API
    # for a "frontend container is alive" check.
    location = /healthz {
        add_header Content-Type application/json;
        return 200 '{"ok":true}';
    }

    # Long-cache static assets; they're content-hashed by Vite so a
    # new deploy always changes the URL.
    location ~* \.(?:js|css|woff2?|svg|png|jpg|jpeg|gif|ico)$ {
        expires 30d;
        access_log off;
        add_header Cache-Control "public, max-age=2592000, immutable";
    }
}
